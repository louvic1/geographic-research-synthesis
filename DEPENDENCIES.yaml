# DEPENDENCIES.yaml
# Declares which skills this system depends on and how they're bundled for export.

system_name: system-1-research-synthesis-system
system_version: 2.0

description: |
  Full AI research pipeline that synthesizes academic literature, analyzes domains,
  maps intellectual debates, generates idea-first visualizations via Claude sandbox,
  writes scientific reports, and renders professional PDFs.

bundled_skills:
  # Phase 1: Research gathering
  - name: notebooklm-research-skill
    path: .system/skills/notebooklm-research-skill
    purpose: "Find and aggregate academic sources from NotebookLM + web"
    exports: [main.py, SKILL.md, prompts/]

  # Phase 2: Domain analysis
  - name: domain-analysis-skill
    path: .system/skills/domain-analysis-skill
    purpose: "Classify sources by domain and extract key insights in parallel"
    exports: [main.py, SKILL.md, agents/]

  # Phase 3: Debate mapping
  - name: debate-generation-skill
    path: .system/skills/debate-generation-skill
    purpose: "Map intellectual landscape: perspectives, contradictions, gaps"
    exports: [main.py, SKILL.md]

  # Phase 4: Idea-first visualization pipeline
  - name: viz-ideation-skill
    path: .system/skills/viz-ideation-skill
    purpose: "Brainstorm compelling visualizations for a research topic (idea-first)"
    exports: [main.py, SKILL.md]

  - name: viz-data-fetch-skill
    path: .system/skills/viz-data-fetch-skill
    purpose: "Fetch specific data from World Bank, GBIF, OWID, NASA for visualization ideas"
    exports: [main.py, SKILL.md]

  - name: viz-render-skill
    path: .system/skills/viz-render-skill
    purpose: "Render visualizations via Claude API code execution sandbox"
    exports: [main.py, SKILL.md, data/]

  - name: viz-orchestrator-skill
    path: .system/skills/viz-orchestrator-skill
    purpose: "Coordinate viz ideation → data fetch → render; produce scout.json-compatible output"
    exports: [main.py, SKILL.md]

  # Phase 4 LEGACY (deprecated, kept for standalone use / backward compatibility)
  - name: chart-skill
    path: .system/skills/chart-skill
    purpose: "[DEPRECATED] Legacy chart rendering — replaced by viz-render-skill"
    exports: [main.py, SKILL.md]
    deprecated: true

  - name: map-skill
    path: .system/skills/map-skill
    purpose: "[DEPRECATED] Legacy map rendering — replaced by viz-render-skill"
    exports: [main.py, SKILL.md]
    deprecated: true

  - name: data-scout-skill
    path: .system/skills/data-scout-skill
    purpose: "[DEPRECATED] Legacy data-first pipeline — replaced by viz-orchestrator-skill"
    exports: [main.py, SKILL.md, prompts/]
    deprecated: true

  # Phase 5: Text writing
  - name: text-writing-skill
    path: .system/skills/text-writing-skill
    purpose: "Write scientific text in French with proper academic formatting"
    exports: [main.py, SKILL.md]

  # Phase 6: PDF assembly
  - name: pdf-rendering-skill
    path: .system/skills/pdf-rendering-skill
    purpose: "Assemble all content into a professional, publication-ready PDF"
    exports: [main.py, SKILL.md, templates/]

shared_imports:
  modules:
    - path: ../../shared/
      description: "Reusable agent base classes and utilities"

pipeline_order:
  1. notebooklm-research-skill     (research)
  2. domain-analysis-skill          (classify)
  3. debate-generation-skill        (map tensions)
  4. viz-orchestrator-skill          (ideate + fetch + render)
  5. text-writing-skill             (write report)
  6. pdf-rendering-skill            (export PDF)

notes: |
  - v2.0: Replaced data-scout-skill with idea-first viz pipeline (4 new skills)
  - Visualization uses Claude API code_execution for rendering (sandbox)
  - Legacy skills (chart-skill, map-skill, data-scout-skill) kept for standalone use
  - The skill loader in main.py looks for skills in .system/skills/
  - Local development uses .claude/skills/ (faster iteration)
